spring.application.name=patient-service
# Serveur
server.port=8081

# Import the platform .env (repo root, one level up from this module's working dir).
# A KEY=VALUE .env is valid .properties syntax; the [.properties] hint tells Boot
# which loader to use. "optional:" => no failure when absent (Docker/CI inject
# real env vars instead of shipping a .env).
spring.config.import=optional:file:../.env[.properties]

# MySQL (credentials externalized to env vars — NFR-S3; defaults keep the local default profile working)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/patientdb?createDatabaseIfNotExist=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:patientdb}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.sql.init.mode=always