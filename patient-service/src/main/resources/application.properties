spring.application.name=patient-service
server.port=8081

# Import du .env racine — [.properties] pour le bon loader ; optional: pas d'erreur si absent (Docker).
spring.config.import=optional:file:../.env[.properties]

# MySQL
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/patientdb?createDatabaseIfNotExist=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:patientdb}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Bridge OBLIGATOIRE : @Value("${medilabo.password-bcrypt}") ne relaxed-bind pas MEDILABO_PASSWORD_BCRYPT seul.
# Défaut DEV : hash bcrypt de 'medilabo123' (jamais en clair — NFR-S3).
medilabo.user=${MEDILABO_USER:medilabo}
medilabo.password-bcrypt=${MEDILABO_PASSWORD_BCRYPT:$2a$10$GzMGhp/NWTujVhv4VyYh9eM.aia95IXMsse7Yl6jUC3DC42/VIinq}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.sql.init.mode=always