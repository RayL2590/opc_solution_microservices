spring.application.name=patient-service
# Serveur
server.port=8081

# Import the platform .env (repo root, one level up from this module's working dir).
# A KEY=VALUE .env is valid .properties syntax; the [.properties] hint tells Boot
# which loader to use. "optional:" => no failure when absent (Docker/CI inject
# real env vars instead of shipping a .env).
spring.config.import=optional:file:../.env[.properties]

# MySQL (credentials externalized to env vars — NFR-S3; defaults keep the local default profile working)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/patientdb?createDatabaseIfNotExist=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:patientdb}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# In-memory user store credentials (Story 2.4, FR-15/FR-16, NFR-S3).
# This dotted/kebab bridge is REQUIRED: @Value("${medilabo.password-bcrypt}") does NOT
# relaxed-bind the UPPER_SNAKE env key on its own — only a real OS-env source does. The
# .env imported above (spring.config.import) arrives as an ordinary property source whose
# keys stay MEDILABO_USER / MEDILABO_PASSWORD_BCRYPT, so without this line the @Value would
# silently fall back to its inline default and ignore a rotated credential. Mirrors the
# Gateway's application.yml bridge (Story 1.4). The committed default is the DEV/eval demo
# hash of 'medilabo123' (NFR-S3: a hash, never plaintext); override via env in any real run.
medilabo.user=${MEDILABO_USER:medilabo}
medilabo.password-bcrypt=${MEDILABO_PASSWORD_BCRYPT:$2a$10$GzMGhp/NWTujVhv4VyYh9eM.aia95IXMsse7Yl6jUC3DC42/VIinq}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.sql.init.mode=always