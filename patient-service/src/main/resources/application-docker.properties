# Profil docker : surcharge les URI MySQL (host = nom du service compose, sans defaults de credentials).
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://mysql:3306/patientdb?createDatabaseIfNotExist=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
