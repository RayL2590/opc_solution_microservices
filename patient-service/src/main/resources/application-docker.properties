# Docker profile overrides (activated by SPRING_PROFILES_ACTIVE=docker — wired in compose, Story 6.2).
# Spring loads application.properties first, then overlays this file when the docker profile is active.
# Only docker-specific datasource overrides live here; all other keys are inherited from application.properties.

# MySQL — DB host is the compose service name "mysql" (not localhost); credentials must come from .env/compose (no defaults).
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://mysql:3306/patientdb?createDatabaseIfNotExist=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
