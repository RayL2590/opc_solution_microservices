spring.application.name=front-service

# 8084 obligatoire : le Gateway démarre sur 8080, un conflit tuerait les deux.
server.port=8084

# Import du .env racine — [.properties] pour le bon loader ; optional: pas d'erreur si absent (Docker).
spring.config.import=optional:file:../.env[.properties]

# Bridge OBLIGATOIRE : @Value("${medilabo.password-bcrypt}") ne relaxed-bind pas MEDILABO_PASSWORD_BCRYPT seul.
# Même identité que Gateway/patient-service pour le forwarding D-SEC-4. Défaut DEV : hash de 'medilabo123'.
medilabo.user=${MEDILABO_USER:medilabo}
medilabo.password-bcrypt=${MEDILABO_PASSWORD_BCRYPT:$2a$10$GzMGhp/NWTujVhv4VyYh9eM.aia95IXMsse7Yl6jUC3DC42/VIinq}
