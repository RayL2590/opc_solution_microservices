spring.application.name=front-service

# Serveur — MUST be 8084. The Gateway publishes 8080; without this the front would
# start on Boot's default 8080 and collide with the Gateway (Story 5.1).
server.port=8084

# Import the platform .env (repo root, one level up from this module's working dir).
# A KEY=VALUE .env is valid .properties syntax; the [.properties] hint tells Boot
# which loader to use. "optional:" => no failure when absent (Docker/CI inject
# real env vars instead of shipping a .env).
spring.config.import=optional:file:../.env[.properties]

# In-memory user store credentials (Story 5.1, FR-15/FR-16, NFR-S3).
# This dotted/kebab bridge is REQUIRED: @Value("${medilabo.password-bcrypt}") does NOT
# relaxed-bind the UPPER_SNAKE env key on its own — only a real OS-env source does. The
# .env imported above (spring.config.import) arrives as an ordinary property source whose
# keys stay MEDILABO_USER / MEDILABO_PASSWORD_BCRYPT, so without this line the @Value would
# silently fall back to a default and ignore a rotated credential. Mirrors patient-service's
# application.properties bridge (Story 2.4) and the Gateway's application.yml (Story 1.4).
# The committed default is the DEV/eval demo hash of 'medilabo123' (NFR-S3: a hash, never
# plaintext); override via env in any real run. Same identity end-to-end so the front can
# forward the inbound Authorization to the Gateway as the same user (D-SEC-4).
medilabo.user=${MEDILABO_USER:medilabo}
medilabo.password-bcrypt=${MEDILABO_PASSWORD_BCRYPT:$2a$10$GzMGhp/NWTujVhv4VyYh9eM.aia95IXMsse7Yl6jUC3DC42/VIinq}
